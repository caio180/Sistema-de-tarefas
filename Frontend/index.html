<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
    <title>Sistema de tarefas</title>
</head>
<body>
    
<div id="menu">
    <h1>Bem vindo ao Sistema de tarefas</h1>
    <h2>Para conseguir acessá-lo, peço que realize o cadastro ou login</h2>
    <button onclick="mostrarCadastro()">Cadastro</button>
    <button onclick="mostrarLogin()">Login</button>
</div>

    <div id="cadastro" class="oculto">
        <form id="formCadastro">
            <h2>Cadastro</h2>

            <input type="text" id="nome" placeholder="Nome completo" required><br><br>
            <input type="email" id="emailCadastro" placeholder="Email" required><br><br>
            <input type="password" id="senhaCadastro" placeholder="Senha" required minlength="6"><br><br>
            <input type="password" id="confirmarSenha" placeholder="Confirmar senha" required><br><br>

            <button type="submit" id="Criar">Cadastrar-se</button> 
        </form>
       <button onclick="mostrarLogin()">Login</button>
       <button onclick="mostrarTelaInicial()">Tela inicial</button>
       
     
    </div>

    <div id="login" class="oculto">
        <form id="formLogin">
            <h2>Login</h2>

            <input type="email" id="emailLogin" placeholder="Email"><br><br>
            <input type="password" id="senhaLogin" placeholder="Senha"><br><br>

        </form>
       <button onclick="mostrarCadastro()">Cadastro</button>   
       <button onclick="mostrarTelaInicial()">Tela inicial</button>  
    </div>

    <script src="home.js" defer></script>


</body>
</html>
